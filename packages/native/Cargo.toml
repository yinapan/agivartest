[package]
name = "agivar-native"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi9"] }
napi-derive = "3"
uiautomation = "0.8"
windows = { version = "0.58", features = [
  "Win32_UI_HiDpi",
  "Win32_Graphics_Gdi",
  "Win32_UI_WindowsAndMessaging",
] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
