                - strong [ref=e131]: ▶ 继续
                - text: ：
              - list [ref=e132]:
                - listitem [ref=e133]: 需要登录某个账号、输入密码；
                - listitem [ref=e134]: 需要过验证码 / 短信验证；
                - listitem [ref=e135]: 需要授予某种系统权限；
                - listitem [ref=e136]: 其它必须由你本人操作的环节。
              - paragraph [ref=e137]:
