              - heading "任务模式" [level=1] [ref=e89]
              - paragraph [ref=e90]: 任务模式是 Agivar 的"干活"模式：你描述要做什么，它自己想清楚步骤，然后真的去操作你的电脑把事情办成。
              - paragraph [ref=e91]: 新建对话默认就是任务模式（不勾选「教学」即可）。
              - heading "怎么用怎么用的直接链接" [level=2] [ref=e92]:
                - text: 怎么用
                - link "怎么用的直接链接" [ref=e93] [cursor=pointer]:
                  - /url: "#怎么用"
                  - text: "#"
              - paragraph [ref=e94]: 直接说你的需求，越具体越好。比如：
              - list [ref=e95]:
                - listitem [ref=e96]:
                  - text: "\"把"
                  - code [ref=e97]: D:\照片\2024
                  - text: 里所有大于 5MB 的 jpg 压缩到 2MB 以内，原图备份到
                  - code [ref=e98]: _orig
                  - text: 子目录"
                - listitem [ref=e99]: "\"打开浏览器，在 bilibili 搜索『非十科技』，进第一个视频，给它投 2 个币\""
                - listitem [ref=e100]:
                  - text: "\"把这个 Excel 里 B 列为空的行删掉，另存为"
                  - code [ref=e101]: cleaned.xlsx
                  - text: "\""
              - paragraph [ref=e102]: 如果只是一个能直接回答的简单问题，它会直接回答，不会"为了用工具而用工具"。
              - heading "它是怎么工作的它是怎么工作的的直接链接" [level=2] [ref=e103]:
                - text: 它是怎么工作的
                - link "它是怎么工作的的直接链接" [ref=e104] [cursor=pointer]:
                  - /url: "#它是怎么工作的"
                  - text: "#"
              - list [ref=e105]:
                - listitem [ref=e106]:
                  - strong [ref=e107]: 先规划，后执行
                  - text: ——任务开始时它会先列一个 TODO 计划（你能在任务进度悬浮窗里看到），然后按计划推进，每完成一步就更新状态。
                - listitem [ref=e108]:
                  - strong [ref=e109]: 优先用"轻"的方式
                  - text: ——能用普通工具、命令、脚本完成的部分，它不会去点界面。GUI 操作（computer use）是兜底手段。
                - listitem [ref=e110]:
                  - strong [ref=e111]: 确定的批量活儿写成脚本
                  - text: ——边界清晰、目标明确的部分，它倾向于写一个 Python 脚本（保存到
                  - code [ref=e112]: ~/.agivar/
                  - text: 下按日期分的脚本目录）再运行，而不是拆成一堆零碎操作。
                - listitem [ref=e113]:
                  - strong [ref=e114]: 执行前查记忆库
                  - text: ——做 GUI 任务前，它会看看记忆库里有没有相关的平台经验、规则、术语。这正是
                  - link "教学模式" [ref=e115] [cursor=pointer]:
                    - /url: /teach-mode/overview
                  - text: 沉淀下来的东西。如果某条记忆引用了示教录屏，它还能就录屏里的细节提问。
                - listitem [ref=e116]:
                  - strong [ref=e117]: 边做边验证
                  - text: ——每一步操作前后它都会观察当前状态，确认操作有没有生效、是不是在朝目标推进。
              - heading "你会看到什么你会看到什么的直接链接" [level=2] [ref=e118]:
