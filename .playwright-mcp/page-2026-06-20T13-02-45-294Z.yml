                  - text: "#"
              - paragraph [ref=e136]: 正常去做你要演示的操作就行。建议：
              - list [ref=e137]:
                - listitem [ref=e138]:
                  - strong [ref=e139]: 动作放慢一点
                  - text: ，每步之间留个小停顿，让关键帧能稳稳抓到操作前的画面。
                - listitem [ref=e140]:
                  - strong [ref=e141]: 一次只演示一个完整的流程
                  - text: ——从一个明确的起点（比如"浏览器已打开"）到一个明确的终点（"已成功投币"），不要把好几件不相干的事录在一起。
              - paragraph [ref=e142]:
                - text: 想给某一步加文字说明时，点控制条上的「注释」，或使用快捷键（Windows：Alt+I；macOS：Cmd+Shift+I），浮窗旁会展开一个
                - strong [ref=e143]: 注释输入区
                - text: ：
              - list [ref=e144]:
                - listitem [ref=e145]: 输入你的说明，比如"这里要等页面完全加载出来再点，否则按钮没反应"。
                - listitem [ref=e146]: Enter 发送，Shift+Enter 换行，Esc 取消。
                - listitem [ref=e147]: 这条注释会按它发生的时间点并入录屏的操作时间轴。
                - listitem [ref=e148]:
                  - text: 输入注释期间你在框里的输入
                  - strong [ref=e149]: 不会被当成操作录进去
                  - text: （连触发用的注释快捷键，以及之后松开修饰键的动作都会被过滤掉）。
              - paragraph [ref=e150]:
                - text: 如果想边演示边说话，点控制条上的绿色声波按钮，或使用快捷键（Windows：Alt+D；macOS：Cmd+Shift+D）开始
                - strong [ref=e151]: 语音注释
                - text: ；再点一次或再次使用同一个快捷键停止。Agivar 会把你的语音转成带时间点的文字注释，识别到内容后自动显示在注释历史里。
              - paragraph [ref=e152]: 什么时候值得加注释？——凡是"光看画面看不出来"的信息：为什么要等一下、为什么选这个而不是那个、这一步的目的是什么、有什么坑。
              - heading "第 3 步：结束录制第 3 步：结束录制的直接链接" [level=3] [ref=e153]:
                - text: 第 3 步：结束录制
