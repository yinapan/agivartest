              - list [ref=e120]:
                - listitem [ref=e121]:
                  - text: 新建一个对话并开启
                  - strong [ref=e122]: 教学模式
                  - text: 。
                - listitem [ref=e123]: 点输入栏「录屏」→「开始录屏」（或在「选择历史录屏」里点「开始录制」）。
                - listitem [ref=e124]:
                  - text: 屏幕上会出现一个
                  - strong [ref=e125]: 浮动录制控制条
                  - text: ——半透明、可拖动、始终置顶，上面有计时、语音注释、文字注释、历史、暂停 / 继续和「结束」。
