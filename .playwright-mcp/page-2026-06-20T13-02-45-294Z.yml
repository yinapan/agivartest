              - paragraph [ref=e245]: 控制条里的绿色声波按钮用于语音注释。开启后你可以照常讲解，Agivar 会实时转写，并把识别出的内容按时间点放进注释历史。AI 在生成"操作描述"时会优先复用你说出来的术语和分段方式（"先点这个按钮"、"接下来..."），所以长流程里不用每一步都打字。
              - paragraph [ref=e246]: 第一次使用时系统可能会弹麦克风权限，允许后即可使用。如果某次没有麦克风权限或设备不可用，录屏照常进行，只是这次没有语音注释。
