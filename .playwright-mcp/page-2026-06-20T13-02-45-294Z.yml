                  - text: "#"
              - paragraph [ref=e155]: 点控制条上的「结束」。如果中途要停一下，先点「暂停」，准备好后再点「继续」；暂停期间不会继续抓画面和操作，也不计入录屏时长。
              - paragraph [ref=e156]:
                - text: 停止后，系统会把刚录的内容整理好，并开始
                - strong [ref=e157]: 后台处理
                - text: ——这一步要联网，耗时取决于录屏长度，通常几十秒到几分钟。处理期间：
