              - paragraph [ref=e92]:
                - text: 录屏教学是 Agivar 最有特色的能力：
                - strong [ref=e93]: 你把一套操作演示一遍，AI 就能把它学会、记下来、以后照着做。
              - blockquote [ref=e94]:
                - paragraph [ref=e95]: 一图胜千言，一段演示胜千张图。与其费劲用文字描述"先点哪、再点哪"，不如录一段屏——鼠标怎么动、键盘敲了什么、屏幕怎么变，全都被精确捕获，AI 不用猜。
              - heading "它解决了什么问题它解决了什么问题的直接链接" [level=2] [ref=e96]:
                - text: 它解决了什么问题
                - link "它解决了什么问题的直接链接" [ref=e97] [cursor=pointer]:
                  - /url: "#它解决了什么问题"
                  - text: "#"
              - paragraph [ref=e98]: 教 GUI 操作流程，用文字描述常常会卡在两个地方：
              - list [ref=e99]:
                - listitem [ref=e100]:
                  - strong [ref=e101]: 写不准
                  - text: ——"点那个提交按钮"，哪个？什么颜色？在哪个区域？文字很容易留歧义。
                - listitem [ref=e102]:
                  - strong [ref=e103]: 写不全
                  - text: ——演示者觉得"理所当然"的小步骤（先点一下输入框激活它、滚动到页面底部……）经常被漏掉。
              - paragraph [ref=e104]: 录屏把这两个问题一并解决：
              - list [ref=e105]:
                - listitem [ref=e106]:
                  - strong [ref=e107]: 精确的动作序列
                  - text: ——录制时同步捕获鼠标点击/拖拽/滚动、键盘输入、热键，连带时间轴，一个都不漏。
                - listitem [ref=e108]:
                  - strong [ref=e109]: 配套的画面
                  - text: ——录制结束后系统自动抽取
                  - strong [ref=e110]: 关键帧
                  - text: ：每个会让画面发生变化的操作（点击、双击、拖拽、按 Enter 提交……）前的那一帧都会被留下，再加上安静时段的定时取样。AI 既能"看见"操作前的界面长什么样，也能对照"操作后变成了什么"。
                - listitem [ref=e111]:
                  - strong [ref=e112]: 你的补充讲解
                  - text: ——录制过程中可以添加文字注释（Windows：Alt+I；macOS：Cmd+Shift+I），也可以点绿色声波按钮录入语音注释；这些讲解会按时间轴并入录屏。
                - listitem [ref=e113]:
                  - strong [ref=e114]: 沉淀成可复用知识
                  - text: ——录屏会被处理成一份
                  - strong [ref=e115]: 结构化的"操作描述"
                  - text: （概述 / 初始状态 / 分步操作 / 阶段性成果），直接进记忆库；条目里还会写明"相关示教视频"的 ID 和关键片段，任务模式日后可以就录屏里的细节追问。
              - heading "完整流程完整流程的直接链接" [level=2] [ref=e116]:
                - text: 完整流程
                - link "完整流程的直接链接" [ref=e117] [cursor=pointer]:
