                  - text: 默认情况下，控制条和注释框会从录屏画面里排除，录到的是它
                  - strong [ref=e133]: 背后
                  - text: 的内容，所以你不用担心它们挡住东西或被一起录下来。只有打开「主播模式」时，浮窗才会被录进去。
              - heading "第 2 步：演示操作（用文字或语音讲解）第 2 步：演示操作（用文字或语音讲解）的直接链接" [level=3] [ref=e134]:
                - text: 第 2 步：演示操作（用文字或语音讲解）
                - link "第 2 步：演示操作（用文字或语音讲解）的直接链接" [ref=e135] [cursor=pointer]:
