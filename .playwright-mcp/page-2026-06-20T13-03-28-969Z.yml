              - list [ref=e148]:
                - listitem [ref=e149]:
                  - strong [ref=e150]: 先看索引再决定新增还是更新
                  - text: ——教学/任务 Agent 启动时就拿到了当前记忆库的索引（每条一行：
                  - code [ref=e151]: 平台/主题 + 一句简介
                  - text: ），所以它知道有哪些条目。要改某条时，会先读出原文，再做精确的局部修改，而不是新建一条重复的。
                - listitem [ref=e152]:
                  - strong [ref=e153]: 整理而非照抄
                  - text: ——把你说的整理成清晰、可执行、可复用的形式。
                - listitem [ref=e154]:
                  - strong [ref=e155]: 冲突以最新为准
                  - text: ——新旧信息冲突时，以你最新的明确说明为准。
                - listitem [ref=e156]:
                  - strong [ref=e157]: 不确定就标注或反问
                  - text: ——不会编造你没教过的步骤。
                - listitem [ref=e158]:
                  - strong [ref=e159]: 不是什么都往里塞
                  - text: ——临时闲聊、一次性指令、没复用价值的信息不入库。
